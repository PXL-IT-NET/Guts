<div class="row">
  <div class="col-12">
    <div class="row mb-2">
      <div class="col-12">
        <div class="card">
          <h5 class="card-header">
            Your test outcomes
            <small
              >({{ model.totalGreenTests }} /
              {{ model.totalTests }} tests)</small
            >
          </h5>
          <div class="card-body">
            <div class="row" *ngIf="teamId > 0">
              <div
                class="col-lg-4 col-xl-2"
                *ngFor="let assignment of model.assignmentSummaries"
              >
                <div class="card mb-2">
                  <div class="card-body">
                    <assignment-summary
                      [model]="assignment"
                      topicType="project"
                      [topicCode]="model.code"
                      [courseId]="courseId"
                    ></assignment-summary>
                  </div>
                </div>
              </div>
            </div>
            <div *ngIf="teamId <= 0">
              You must <a [routerLink]="['../teams']">join a team</a> to see
              your test outcomes.
            </div>
            <app-loading-overlay [show]="loadingSummary"></app-loading-overlay>
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <div class="card">
          <h5 class="card-header">Number of passed tests of others</h5>
          <div class="card-body">
            <div class="row">
              <div
                class="col-lg-4 col-xl-3"
                *ngFor="let assignment of statistics.assignmentStatistics"
              >
                <div class="card mb-2">
                  <div class="card-body">
                    <assignment-statistics
                      [model]="assignment"
                    ></assignment-statistics>
                  </div>
                </div>
              </div>
            </div>
            <app-loading-overlay
              [show]="loadingStatistics"
            ></app-loading-overlay>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
