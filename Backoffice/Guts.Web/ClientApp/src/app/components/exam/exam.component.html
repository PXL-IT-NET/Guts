<div class="card">
  <app-loading-overlay [show]="loading"></app-loading-overlay>
  <div class="card-header">Exams</div>
  <ul class="list-group list-group-flush">
    @for (exam of exams; track exam) {
      <li class="list-group-item">
        <div class="mb-2">
          <span>{{ exam.name }}</span>
          <button
            class="btn btn-sm ms-2 btn-outline-primary"
            type="button"
            (click)="exam.isCollapsed = !exam.isCollapsed"
            >
            @if (exam.isCollapsed) {
              <span class="fa fa-plus"></span>
            }
            @if (!exam.isCollapsed) {
              <span class="fa fa-minus"></span>
            }
          </button>
          <button
            class="btn btn-sm ms-2 btn-outline-secondary"
            (click)="downloadResults(exam)"
            >
            Download results
          </button>
        </div>
        <div [ngbCollapse]="exam.isCollapsed">
          <div class="card card-body">
            <h6>Exam parts</h6>
            <ul class="list-group list-group-flush">
              @for (exampart of exam.parts; track exampart) {
                <li
                  class="list-group-item list-group-item-secondary"
                  >
                  <app-exampart
                    [model]="exampart"
                    [examId]="exam.id"
                    (examPartDeleted)="onExamPartDeleted($event, exam)"
                  ></app-exampart>
                </li>
              }
              <li class="list-group-item list-group-item-secondary">
                <app-exampart
                  [examId]="exam.id"
                  (examPartAdded)="onExamPartAdded($event, exam)"
                ></app-exampart>
              </li>
            </ul>
          </div>
        </div>
      </li>
    }
    <li class="list-group-item">
      <div class="mb-2">
        <button
          class="btn btn-sm btn-outline-primary ms-3"
          type="button"
          (click)="newExam.isCollapsed = !newExam.isCollapsed"
          >
          Add new exam
        </button>
      </div>
      <div [ngbCollapse]="newExam.isCollapsed">
        <div class="card card-body">
          <form
            name="form"
            (ngSubmit)="f.form.valid && saveNewExam()"
            #f="ngForm"
            novalidate
            >
            <div class="mb-2">
              <label for="name">Name</label>
              <input
                type="text"
                class="form-control"
                id="name"
                name="name"
                [(ngModel)]="newExam.name"
                #name="ngModel"
                required
                [ngClass]="{ 'is-invalid': f.submitted && !name.valid }"
                />
              <div class="invalid-feedback">Name is required</div>
            </div>
            <div class="mb-2">
              <button
                [disabled]="loading"
                class="btn btn-outline-primary"
                type="submit"
                >
                Save
              </button>
            </div>
          </form>
        </div>
      </div>
    </li>
  </ul>
</div>
