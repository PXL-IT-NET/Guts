<div class="row">
  <div class="col-12">
    <h5>Test results</h5>
  </div>
</div>
<div class="row">
  <div class="col-md-12">
    @if (model.components.length > 0 && model.teams.length > 0) {
      <form>
        <div class="mb-2 row">
          <label for="teams" class="col-lg-1 col-md-2 col-form-label">Team</label>
          <div class="col-lg-3 col-md-4">
            <select name="teams" class="form-select" [(ngModel)]="selectedTeamId">
              @for (team of model.teams; track team) {
                <option [ngValue]="team.id">
                  {{ team.name }}
                </option>
              }
            </select>
          </div>
          <label for="date" class="col-lg-1 col-md-2 col-form-label"
            >Status on</label
            >
            <div class="col-lg-3 col-md-4">
              <app-ng-datetime
                name="date"
                [(date)]="selectedDate"
              ></app-ng-datetime>
            </div>
          </div>
        </form>
      }
      @if (model.components.length == 0) {
        <p>
          This project has no components configured yet.
        </p>
      }
      <app-loading-overlay [show]="loading"></app-loading-overlay>
    </div>
  </div>
  @if (model.components.length > 0) {
    <div class="row">
      <div class="col-md-12">
        @if (selectedAssignmentId <= 0) {
          <app-project-summary
            [courseId]="courseId"
            [projectCode]="projectCode"
            [teamId]="selectedTeamId"
            [statusDate]="selectedDate"
            >
          </app-project-summary>
        }
        @if (selectedAssignmentId > 0) {
          <app-assignment-detail
            [assignmentId]="selectedAssignmentId"
            [teamId]="selectedTeamId"
            [statusDate]="selectedDate"
            >
          </app-assignment-detail>
        }
      </div>
    </div>
  }
